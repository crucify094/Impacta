kind = "web"
previewPath = "/"
title = "IMPACTA OSINT"
version = "1.0.0"
id = "artifacts/impacta-osint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21535

[services.development]
run = "pnpm --filter @workspace/impacta-osint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/impacta-osint", "run", "build" ]
publicDir = "artifacts/impacta-osint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21535"
BASE_PATH = "/"
